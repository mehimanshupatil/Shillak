<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />

  <!-- Theme -->
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="background-color" content="#0f0f0f" />

  <!-- PWA / Apple -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shillak" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

  <!-- Primary meta -->
  <title>Shillak — Private Household Budget Tracker</title>
  <meta name="description" content="Shillak is a privacy-first household finance app. Track shared expenses, manage budgets, and hit savings goals — no server, no login, no cloud. Your data never leaves your device." />
  <meta name="keywords" content="budget tracker, household expenses, family budget, offline, private, savings goals, recurring expenses" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Shillak — Private Household Budget Tracker" />
  <meta property="og:description" content="Track household expenses and budgets with your partner or family. No server, no login — fully offline and private." />
  <meta property="og:image" content="/icons/icon-512.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Shillak — Private Household Budget Tracker" />
  <meta name="twitter:description" content="Track household expenses and budgets. Fully offline, no server, no login." />
  <meta name="twitter:image" content="/icons/icon-512.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
